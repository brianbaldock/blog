name: Build and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build site
        run: npm run build

      - name: Install a11y tooling
        run: npm install --no-save pa11y-ci@^3 http-server@^14

      - name: Serve dist for a11y check
        run: npx http-server dist -p 4321 -c-1 -s &
        env:
          NODE_ENV: production

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:4321/ > /dev/null; then
              echo "Server up"; exit 0
            fi
            sleep 1
          done
          echo "Server did not start"; exit 1

      - name: Run pa11y-ci
        run: npx pa11y-ci --config .pa11yci.cjs

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
